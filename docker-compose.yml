services:
  postgres:
    image: postgres:15-alpine
    container_name: codepulse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: codepulse
      POSTGRES_PASSWORD: codepulse_dev_password
      POSTGRES_DB: codepulse_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codepulse -d codepulse_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: codepulse_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass codepulse_redis_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "codepulse_redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
